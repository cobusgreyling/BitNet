<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3a4f"/>
      <stop offset="50%" style="stop-color:#374357"/>
      <stop offset="100%" style="stop-color:#2d3a4f"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="glow-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Title -->
  <text x="600" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#f8fafc" text-anchor="middle" filter="url(#glow)">What If Every Weight Was Just -1, 0, or 1?</text>
  <text x="600" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" text-anchor="middle">The journey from efficient NLU models to massive LLMs — and back again</text>

  <!-- Timeline arrow -->
  <line x1="100" y1="120" x2="1100" y2="120" stroke="#334155" stroke-width="1.5"/>
  <polygon points="1100,120 1092,115 1092,125" fill="#334155"/>

  <!-- ===== ERA 1: NLU (small, efficient) ===== -->
  <g transform="translate(80, 145)">
    <!-- Small chip/device -->
    <rect width="260" height="220" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>

    <!-- Tiny chip icon -->
    <rect x="90" y="20" width="80" height="80" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Chip pins -->
    <line x1="100" y1="20" x2="100" y2="10" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="115" y1="20" x2="115" y2="10" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="130" y1="20" x2="130" y2="10" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="145" y1="20" x2="145" y2="10" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="160" y1="20" x2="160" y2="10" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="100" y1="100" x2="100" y2="110" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="115" y1="100" x2="115" y2="110" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="130" y1="100" x2="130" y2="110" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="145" y1="100" x2="145" y2="110" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="160" y1="100" x2="160" y2="110" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <!-- Chip label -->
    <text x="130" y="65" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">CPU</text>

    <!-- Size indicator -->
    <text x="130" y="132" font-family="monospace" font-size="22" font-weight="700" fill="#3b82f6" text-anchor="middle">~50 MB</text>

    <!-- Labels -->
    <text x="130" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Rasa, LUIS, Dialogflow</text>
    <text x="130" y="178" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Single CPU core</text>
    <text x="130" y="194" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Phones, kiosks, IoT</text>

    <!-- Era label -->
    <text x="130" y="215" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">sub-millisecond latency</text>
  </g>

  <!-- Era 1 label below -->
  <text x="210" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#3b82f6" text-anchor="middle">NLU Era</text>
  <text x="210" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Small, efficient, edge-native</text>
  <text x="210" y="428" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">2015 — 2020</text>

  <!-- Arrow 1→2 -->
  <g transform="translate(355, 240)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
    <polygon points="55,0 48,-5 48,5" fill="#ef4444" opacity="0.4"/>
    <text x="27" y="18" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" opacity="0.6">bigger</text>
  </g>

  <!-- ===== ERA 2: LLM (massive, cloud) ===== -->
  <g transform="translate(430, 145)">
    <rect width="300" height="220" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>

    <!-- GPU cluster visualization -->
    <!-- GPU 1 -->
    <rect x="25" y="15" width="55" height="40" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
    <text x="52" y="40" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">GPU</text>
    <!-- GPU 2 -->
    <rect x="90" y="15" width="55" height="40" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
    <text x="117" y="40" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">GPU</text>
    <!-- GPU 3 -->
    <rect x="155" y="15" width="55" height="40" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
    <text x="182" y="40" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">GPU</text>
    <!-- GPU 4 -->
    <rect x="220" y="15" width="55" height="40" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
    <text x="247" y="40" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">GPU</text>

    <!-- GPU row 2 -->
    <rect x="25" y="62" width="55" height="40" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <text x="52" y="87" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle" opacity="0.7">GPU</text>
    <rect x="90" y="62" width="55" height="40" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <text x="117" y="87" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle" opacity="0.7">GPU</text>
    <rect x="155" y="62" width="55" height="40" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <text x="182" y="87" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle" opacity="0.7">GPU</text>
    <rect x="220" y="62" width="55" height="40" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <text x="247" y="87" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle" opacity="0.7">GPU</text>

    <!-- Size -->
    <text x="150" y="130" font-family="monospace" font-size="22" font-weight="700" fill="#ef4444" text-anchor="middle">~200 GB</text>

    <!-- Labels -->
    <text x="150" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">100B parameters × 16-bit</text>
    <text x="150" y="173" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Multi-GPU clusters</text>
    <text x="150" y="189" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Cloud only, $3-5/hr</text>
    <text x="150" y="215" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">65,536 distinct values per weight</text>
  </g>

  <!-- Era 2 label below -->
  <text x="580" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="middle">LLM Era</text>
  <text x="580" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Massive, expensive, cloud-bound</text>
  <text x="580" y="428" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">2022 — 2024</text>

  <!-- Arrow 2→3 -->
  <g transform="translate(745, 240)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#10b981" stroke-width="2" opacity="0.4"/>
    <polygon points="55,0 48,-5 48,5" fill="#10b981" opacity="0.4"/>
    <text x="27" y="18" font-family="system-ui, sans-serif" font-size="9" fill="#10b981" text-anchor="middle" opacity="0.6">smarter</text>
  </g>

  <!-- ===== ERA 3: BitNet (small again, but powerful) ===== -->
  <g transform="translate(820, 145)">
    <rect width="280" height="220" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" opacity="0.9"/>

    <!-- Glow effect behind chip -->
    <circle cx="140" cy="55" r="45" fill="url(#glow-green)" filter="url(#bigglow)"/>

    <!-- Chip icon (same as era 1 but glowing green) -->
    <rect x="100" y="15" width="80" height="80" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <!-- Chip pins -->
    <line x1="110" y1="15" x2="110" y2="5" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="125" y1="15" x2="125" y2="5" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="140" y1="15" x2="140" y2="5" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="155" y1="15" x2="155" y2="5" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="170" y1="15" x2="170" y2="5" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="110" y1="95" x2="110" y2="105" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="125" y1="95" x2="125" y2="105" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="140" y1="95" x2="140" y2="105" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="155" y1="95" x2="155" y2="105" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="170" y1="95" x2="170" y2="105" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <!-- Chip label -->
    <text x="140" y="55" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">CPU</text>
    <text x="140" y="70" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle" opacity="0.6">100B</text>

    <!-- Size -->
    <text x="140" y="132" font-family="monospace" font-size="22" font-weight="700" fill="#10b981" text-anchor="middle">~20 GB</text>

    <!-- Labels -->
    <text x="140" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">100B parameters × 1.58-bit</text>
    <text x="140" y="173" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Single CPU, no GPU</text>
    <text x="140" y="189" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Laptops, edge, local</text>
    <text x="140" y="215" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">3 values per weight: -1, 0, +1</text>
  </g>

  <!-- Era 3 label below -->
  <text x="960" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#10b981" text-anchor="middle">BitNet Era</text>
  <text x="960" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">LLM capability, edge deployment</text>
  <text x="960" y="428" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">2025+</text>

  <!-- ===== Bottom: Weight zoom ===== -->
  <rect x="100" y="455" width="1000" height="100" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>

  <text x="600" y="478" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b" text-anchor="middle">A SINGLE WEIGHT</text>

  <!-- FP32 -->
  <g transform="translate(140, 490)">
    <rect width="200" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="100" y="16" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">FP32 (32 bits)</text>
    <text x="100" y="30" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">0.00347519226...</text>
  </g>

  <!-- Arrow -->
  <text x="365" y="513" font-family="system-ui, sans-serif" font-size="16" fill="#475569">→</text>

  <!-- FP16 -->
  <g transform="translate(390, 490)">
    <rect width="170" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="85" y="16" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">FP16 (16 bits)</text>
    <text x="85" y="30" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">0.003475</text>
  </g>

  <!-- Arrow -->
  <text x="585" y="513" font-family="system-ui, sans-serif" font-size="16" fill="#475569">→</text>

  <!-- INT4 -->
  <g transform="translate(610, 490)">
    <rect width="140" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="70" y="16" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">INT4 (4 bits)</text>
    <text x="70" y="30" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">0</text>
  </g>

  <!-- Arrow -->
  <text x="775" y="513" font-family="system-ui, sans-serif" font-size="16" fill="#475569">→</text>

  <!-- BitNet Ternary -->
  <g transform="translate(800, 490)">
    <rect width="250" height="36" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2"/>
    <text x="125" y="16" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">Ternary (1.58 bits)</text>
    <text x="60" y="32" font-family="monospace" font-size="16" font-weight="700" fill="#f87171" text-anchor="middle">-1</text>
    <text x="125" y="32" font-family="monospace" font-size="16" font-weight="700" fill="#64748b" text-anchor="middle">0</text>
    <text x="190" y="32" font-family="monospace" font-size="16" font-weight="700" fill="#10b981" text-anchor="middle">+1</text>
  </g>

  <!-- Compression label -->
  <text x="600" y="548" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">32 bits → 16 bits → 4 bits → 1.58 bits  |  4 billion values → 65,536 → 16 → 3</text>

  <!-- Bottom -->
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#f8fafc" text-anchor="middle" filter="url(#glow)">Three values. That is all they need.</text>
  <text x="600" y="618" font-family="system-ui, sans-serif" font-size="11" fill="#334155" text-anchor="middle">Cobus Greyling</text>
</svg>
